    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --cream: #faf8f5;
      --white: #ffffff;
      --black: #1a1a1a;
      --red:   #c0392b;
      --red2:  #a93226;

    html, body { height: 100%; }

      display: flex;

    /* ── HERO ── */

      flex: 1;

      align-items: center;
      padding: 40px 20px 0;
      animation: fadeUp 0.5s ease both;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .tagline {
      font-size: 12px; font-weight: 500;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .tagline {
      font-size: 12px; font-weight: 500;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* ── CAROUSEL ── */
    .carousel-wrap {
      width: 100%; max-width: 420px;
      margin-bottom: 28px;
      position: relative;
    }
    .carousel-track {
      display: flex;
      overflow: hidden;
      border-radius: 18px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.1);
    }
    .carousel-slide {
      min-width: 100%;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      display: flex; align-items: center; gap: 16px;
      animation: fadeSlide 0.35s ease both;
    }
    @keyframes fadeSlide { from { opacity:0; transform:translateX(10px); } to { opacity:1; transform:translateX(0); } }
    .slide-emoji { font-size: 40px; flex-shrink: 0; }
    .slide-info { flex: 1; min-width: 0; }
    .slide-name { font-size: 17px; font-weight: 700; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .slide-desc { font-size: 12px; color: var(--muted); line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .slide-price {
      font-family: 'Lobster', cursive;
      font-size: 22px; color: var(--red);
      flex-shrink: 0;
    }
    /* dots */
    .carousel-dots {
      display: flex; justify-content: center; gap: 6px;
      margin-top: 10px;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--border);
      transition: all 0.25s;
    }
    .dot.active { background: var(--red); width: 18px; border-radius: 3px; }

    /* ── NAV BUTTONS ── */
    .nav-buttons {
      display: flex; flex-direction: column; gap: 10px;
      width: 100%; max-width: 420px;
      padding: 0 0 12px;
    }
    .btn {
      display: flex; align-items: center; justify-content: space-between;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600; font-size: 16px;
      padding: 17px 20px;
      border-radius: 16px;
      border: 1.5px solid transparent;
      transition: all 0.2s ease;
    }
    .btn-left { display: flex; align-items: center; gap: 12px; }
    .btn-icon { font-size: 20px; }
    .btn-arrow { font-size: 16px; opacity: 0.45; transition: transform 0.2s; }
    .btn:hover .btn-arrow { transform: translateX(4px); opacity: 1; }

    .btn-primary { background: var(--red); color: #fff; box-shadow: 0 4px 16px rgba(192,57,43,0.28); }
    .btn-primary:hover { background: var(--red2); }

    .btn-secondary { background: var(--white); color: var(--black); border-color: var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .btn-secondary:hover { border-color: #ccc; }

    .btn-dark { background: var(--black); color: #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.18); }
    .btn-dark:hover { background: #2d2d2d; }

    /* ── FOOTER ── */
    .social-bar {
      padding: 20px 20px 28px;
      display: flex; justify-content: center; align-items: center; gap: 20px;
      border-top: 1px solid var(--border);
    }
    .social-link {
      display: flex; align-items: center; gap: 5px;
      color: var(--muted); text-decoration: none;
      font-size: 12px; font-weight: 500;
      transition: color 0.2s;
    }
    .social-link:hover { color: var(--red); }
    .social-link svg { width: 16px; height: 16px; fill: currentColor; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }

<script>
const API_BASE = "https://orderpucciotto.onrender.com";
const EMOJI = { pucciotti: "🥙", crocchette: "🥔" };

let slides = [];
let current = 0;
let timer = null;

async function loadCarousel() {
  try {
    const res = await fetch(`${API_BASE}/api/menu`);
    if (!res.ok) return;
    const data = await res.json();

    // Merge pucciotti + crocchette, only available
    const items = [
      ...(data.pucciotti  || []),
      ...(data.crocchette || []),
    ].filter(i => i.is_available);

    if (!items.length) return;

    // Shuffle
    for (let i = items.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [items[i], items[j]] = [items[j], items[i]];
    }
    slides = items;
    buildCarousel();
  } catch {}
}

function buildCarousel() {
  const track = document.getElementById("carousel-track");
  const dots  = document.getElementById("carousel-dots");
  const wrap  = document.getElementById("carousel-wrap");

  slides.forEach((item, i) => {
    const cat = item.category || "pucciotti";
    const emoji = EMOJI[cat] || "🍽️";
    const desc = item.ingredients?.join(", ") || "";

    const slide = document.createElement("div");
    slide.className = "carousel-slide";
    slide.style.display = i === 0 ? "flex" : "none";
    slide.innerHTML = `
      <span class="slide-emoji">${emoji}</span>
      <div class="slide-info">
        <div class="slide-name">${item.name}</div>
        ${desc ? `<div class="slide-desc">${desc}</div>` : ""}
      </div>
      <span class="slide-price">€${parseFloat(item.price).toFixed(2)}</span>`;
    track.appendChild(slide);

    const dot = document.createElement("div");
    dot.className = "dot" + (i === 0 ? " active" : "");
    dots.appendChild(dot);
  });

  wrap.style.display = "block";
  startAuto();

  // Touch swipe
  let startX = 0;
  track.addEventListener("touchstart", e => { startX = e.touches[0].clientX; }, { passive: true });
  track.addEventListener("touchend", e => {
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 40) goTo(dx < 0 ? current + 1 : current - 1);
  }, { passive: true });
}

function goTo(n) {
  const allSlides = document.querySelectorAll(".carousel-slide");
  const allDots   = document.querySelectorAll(".dot");
  allSlides[current].style.display = "none";
  allDots[current].classList.remove("active");
  current = (n + slides.length) % slides.length;
  allSlides[current].style.display = "flex";
  allDots[current].classList.add("active");
  startAuto(); // reset timer ad ogni cambio slide
}

function startAuto() {
  clearInterval(timer);
  timer = setInterval(() => goTo(current + 1), 3200);
}

loadCarousel();
</script>
